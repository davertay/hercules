name: Claude

on:
  issues:
    types: [labeled, closed]
  issue_comment:
    types: [created]

concurrency:
  group: agent-issue-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  triage-queue:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'agent:queued' &&
      github.event.sender.login != 'brucebruiser'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKFLOW_PAT }}
          show_full_output: true
          prompt: "Read the file .workflow/triage-queue.md and follow its steps for issue #${{ github.event.issue.number }}."
          claude_args: |
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
            --max-turns 30

  implement-issue:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    # Serialise builds: at most one implement-issue (or reconcile-branches)
    # job runs at a time, repo-wide. Paces API usage and stops parallel
    # branches piling up. cancel-in-progress is false so a running build is
    # never killed mid-flight. See ISSUES.md > Build dispatcher & WIP cap.
    concurrency:
      group: agent-serial-build
      cancel-in-progress: false
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKFLOW_PAT }}
          show_full_output: true
          prompt: "Read the file .workflow/implement-issue.md and follow its steps for issue #${{ github.event.issue.number }}."
          claude_args: |
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
            --max-turns 60

  ci-feedback-guard:
    if: >-
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '<!-- ci-result -->')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    timeout-minutes: 5
    outputs:
      blocked: ${{ steps.check.outputs.blocked }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          branch=$(gh pr view "$PR" --repo "$REPO" --json headRefName -q .headRefName)
          if [[ ! "$branch" =~ ^agent/issue-([0-9]+)$ ]]; then
            echo "PR #$PR head '$branch' is not an agent branch; ci-feedback will no-op."
            echo "blocked=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          issue="${BASH_REMATCH[1]}"
          if gh issue view "$issue" --repo "$REPO" --json labels \
               -q '.labels[].name' | grep -qx 'agent:blocked'; then
            echo "Issue #$issue is agent:blocked — skipping ci-feedback."
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

  ci-feedback:
    needs: ci-feedback-guard
    if: needs.ci-feedback-guard.outputs.blocked == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKFLOW_PAT }}
          show_full_output: true
          prompt: "Read the file .workflow/ci-feedback.md and follow its steps for PR #${{ github.event.issue.number }}."
          claude_args: |
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
            --max-turns 60

  promote-waiting:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKFLOW_PAT }}
          show_full_output: true
          prompt: "Read the file .workflow/promote-waiting.md and follow its steps. Issue #${{ github.event.issue.number }} just closed."
          claude_args: |
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
            --max-turns 30
